steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website:$COMMIT_SHA
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - reboo8-website
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website:$COMMIT_SHA
      - --region=asia-northeast1
      - --platform=managed
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2
      - --port=8080
      - --timeout=60
      - --allow-unauthenticated
      - --quiet

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website:$COMMIT_SHA
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/reboo8-website:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: '600s'
